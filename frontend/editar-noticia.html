<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Notícia</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/style-add-noticias.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <h1 class="navbar-brand">Editar Notícia</h1>
          <div class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll">
            <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll">
              <li class="nav-item">
                <a
                  class="nav-link"
                  aria-current="page"
                  href="view-noticias.html"
                  >Ver notícias</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <article>
        <form>
          <div class="mb-3">
            <label for="titulo" class="form-label"
              >Título</label
            >
            <input
              type="text"
              class="form-control"
              id="titulo"
              name="titulo"
              required
            />

            <label for="subtitulo" class="form-label"
              >Subtítulo</label
            >
            <input
              type="text"
              class="form-control"
              id="subtitulo"
              name="subtitulo"
              required
            />

            <label for="imagem" class="form-label">Imagem Principal</label>
            <input class="form-control" type="file" id="imagem" name="imagem" required  />

            <label for="legenda" class="form-label"
              >Legenda</label
            >
            <input
              type="text"
              class="form-control"
              id="legenda"
              name="legenda"
              required
            />

            <label for="conteudo" class="form-label"
              >Conteúdo</label
            >
            <textarea
              class="form-control"
              id="conteudo"
              name="conteudo"
              required
              rows="3"
            ></textarea>

            <label for="categoria" class="form-label">Categoria</label>
            <select id="categoria" class="form-select" required name="categoria">
              <option selected>Escolha...</option>
              <option>...</option>
            </select>
          </div>

          <button class="btn btn-primary" type="submit" aria-label="Editar Notícia">Editar</button>
        </form>
      </article>
    </main>
    
  </body>
</html>
